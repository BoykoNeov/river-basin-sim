# M3 scenario (HANDOFF §7.1) -- exercises the "real scenarios" features on the
# real M0 terrain tile (Great Smoky Mtns, EPSG:32617, 1024x1024 @ ~28 m).
#
# Demonstrates, self-contained (needs only the demo tile -- no extra field files):
#   * an inflow hydrograph -- a tributary discharge rising then receding;
#   * a constant-rate infiltration loss (scalar mm/hr);
#   * an open (free-outflow) boundary so water routes off the domain edge;
#   * scalar Manning roughness + uniform rain (as M2).
#
# For spatially-varying manning/infiltration/rain fields, point those keys at a
# raw little-endian float32 .r32 aligned to the tile (see scenarios/README.md).
#
# Run: uv run python -m solver.run --config scenarios/river_reach.toml

[meta]
name = "river_reach"
seed = 12345
scheme = "local_inertial"

[grid]
tiles_dir = "data/tiles/demo"    # dx / crs inherit from tiles.json

[run]
end_time = 3600.0                # 1 h simulated
output_every = 300.0             # 13 frames
cfl = 0.7
dt_max = 30.0

[rainfall]
type = "uniform"
rate_mm_hr = 30.0
duration_s = 1800.0              # rain for the first half hour

[parameters]
manning_n = 0.04
infiltration = 3.0               # constant-rate loss, mm/hr

# A tributary entering near the top-centre of the tile: ramps to 40 m^3/s, holds,
# then recedes. (row, col) into the 1024x1024 grid.
[[inflow]]
cell = [128, 512]
hydrograph = [[0.0, 0.0], [900.0, 40.0], [2700.0, 40.0], [3600.0, 0.0]]

[boundaries]
default = "closed"
south = "open"                   # let water route off the southern edge
